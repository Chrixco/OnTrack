name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6

    - name: Run syntax check
      run: |
        python -m py_compile dashboard/main.py
        python -m py_compile dashboard/app.py
        python -m py_compile dashboard/widgets/*.py
        python -m py_compile dashboard/settings/*.py
        python -m py_compile dashboard/network/*.py

    - name: Run test suite
      run: |
        cd dashboard
        python test_components.py

    - name: Check imports
      run: |
        cd dashboard
        python -c "from app import MainWindow; print('✓ App imports successfully')"
        python -c "from settings.config_manager import ConfigManager; print('✓ ConfigManager imports')"
        python -c "from network.udp_receiver import UDPReceiver; print('✓ UDPReceiver imports')"
